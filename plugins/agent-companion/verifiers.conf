# Active verifier agents — one adapter name per line.
# NONE are active by default; enable the ones you want, e.g.:
#   /agent-companion:verifiers add codex
#   /agent-companion:verifiers add gemini
#   /agent-companion:verifiers add grok            # grok CLI · Grok Build (xAI)
#   /agent-companion:verifiers add grok-composer   # grok CLI · Composer 2.5 Fast (Cursor)
# Each adapter only needs its CLI installed and authenticated by ANY method that CLI
# supports (browser/OAuth login, config file, or API key) — no specific env var required.
# Available adapters: codex, gemini, grok, grok-composer
