# Active verifier agents — one entry per line, format:  cli[:model][@effort]
#   cli      adapter basename: codex | gemini | grok        (required)
#   :model   pin a specific model (optional; omitted → the CLI's own frontier default)
#   @effort  reasoning effort: low|medium|high|xhigh|max     (optional; omitted → dispatch effort)
# NONE are active by default; enable the ones you want, e.g.:
#   /agent-companion:verifiers add codex                    # frontier default, dispatch effort
#   /agent-companion:verifiers add codex:gpt-5.6-sol@high   # pin model + effort
#   /agent-companion:verifiers add gemini                   # gemini has no effort knob (@effort ignored)
#   /agent-companion:verifiers add grok@high                # frontier grok at high effort
# Entries are matched EXACTLY — `codex` and `codex:gpt-5.5@high` are distinct verifiers and
# may coexist; `remove codex` removes only the bare entry.
# Each adapter only needs its CLI installed and authenticated by ANY method that CLI
# supports (browser/OAuth login, config file, or API key) — no specific env var required.
# Available adapters: codex, gemini, grok  (effort honored by codex & grok; gemini ignores it)
